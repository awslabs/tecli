exclude: "^$"
fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      # forbid files which have a UTF-8 byte-order marker
      - id: fix-byte-order-marker
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      # This hook checks json files for parseable syntax.
      - id: check-json
      # Check for files that contain merge conflict strings.
      - id: check-merge-conflict
      # Checks for symlinks which do not point to anything.
      - id: check-symlinks
      # This hook checks toml files for parseable syntax.
      - id: check-toml
      # Ensures that links to vcs websites are permalinks.
      - id: check-vcs-permalinks
      # This hook checks xml files for parseable syntax.
      - id: check-xml
      # This hook checks yaml files for parseable syntax.
      - id: check-yaml
      # Detects symlinks which are changed to regular files with a content of a path which that symlink was pointing to.
      - id: destroyed-symlinks
      # Detects the presence of private keys
      - id: detect-private-key
        exclude: TIPS.md
      # Ensures that a file is either empty, or ends with one newline.
      - id: end-of-file-fixer
        exclude: README.md
      # Replaces or checks mixed line ending
      - id: mixed-line-ending
        args: ["--fix=lf"]
        description: Forces to replace line ending by the UNIX 'lf' character.
      # This hook trims trailing whitespace.
      - id: trailing-whitespace

  # Prettier is an opinionated code formatter.
  # The official `pre-commit/mirrors-prettier` repo is archived; pin to the last
  # stable v4 alpha which works with current pre-commit and Node.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier

  # Lightweight Go hooks (gofmt, goimports). The maintainer of dnephin's repo
  # recommends migrating heavier checks to golangci-lint (see below).
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports

  # golangci-lint runs the canonical Go linters (govet, staticcheck, errcheck,
  # ineffassign, unused, ...) in a single fast pass. Pinned to the latest v2.
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
