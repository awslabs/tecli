name: Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to least-privilege; individual jobs may opt-in to more.
permissions:
  contents: read

jobs:
  linux-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          cache: true
      - run: go version
      - run: go env
      - run: go generate ./...
      - name: Run go vet
        run: go vet ./...
      - name: Run go build
        run: go build ./...
