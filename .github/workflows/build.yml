name: Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to least-privilege; individual jobs may opt-in to more.
permissions:
  contents: read

jobs:
  linux-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
          cache: true
      - run: go version
      - run: go env
      - run: go generate ./...
      - name: Run go vet
        run: go vet ./...
      - name: Run go build
        run: go build ./...
